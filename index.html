<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@500&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Alfa+Slab+One&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap");

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        -ms-overflow-style: none;
        scrollbar-width: none;
        overflow-y: scroll;
      }
      body::-webkit-scrollbar {
        display: none;
      }

      header {
        width: 100%;
        height: 8vh;
        font-family: "Fredoka One", cursive;
        background-color: #ffca00;
        margin-bottom: 1vh;
        color: #131313;
        padding-left: 5%;
        padding-top: 10px;
      }
      textarea {
        padding-left: 20px;
        padding-top: 20px;
        margin-bottom: 1vh;
        width: 100%;
        height: 90vh;
        resize: none;
        background-color: #f7f7f7;
        color: #131313;
      }
      iframe {
        display: block;
        margin-left: auto;
        margin-right: auto;
        width: 1900px;
        height: 100vh;
        margin-bottom: 1vh;
      }
      .buttons {
        display: flex;
        flex-direction: row;
        justify-content: space-around;
        flex-wrap: wrap;
        width: 100%;
        height: 100%;
      }
      .buttons button {
        cursor: pointer;
        border: none;
        margin-bottom: 1vh;
        width: 15%;
        height: 8vh;
        background-color: transparent;
        color: black;
        font-size: 30px;
        font-family: "Oswald", sans-serif;
      }
      .buttons button:hover {
        background-color: whitesmoke;
        font-size: 35px;
      }
    </style>
    <title>Web-Editor</title>
  </head>
  <body>
    <header>
      <h1>Web Editor</h1>
    </header>

    <div class="buttons">
      <button onclick="desktop_view()" title="Desktop view">
        <i class="fas fa-desktop"></i>
      </button>
      <button onclick="mobile_view()" title="mobile view">
        <i class="fas fa-mobile-alt"></i>
      </button>
      <button onclick="tablet_view()" title="Tablet view">
        <i class="fas fa-tablet-alt"></i>
      </button>
      <button onclick="code_copy()" title="Copy the Code">
        <i class="fas fa-copy"></i>
      </button>
      <button onclick="Run()" title="Run the Code">Run</button>
    </div>
    <textarea name="" id="code"></textarea>
    <div class="resut">
      <iframe id="output" frameborder="1"></iframe>
    </div>

    <script type="text/javascript" src="App.js">
      
    </script>
    <script
      src="https://kit.fontawesome.com/f5e251485b.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
